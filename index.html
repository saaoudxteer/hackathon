<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMU Graph - L'Œuvre Collective</title>
  <link rel="stylesheet" href="/src/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div id="cy"></div>

  <header class="floating-header glass">
    <div class="logo">AMU <span class="logo-dim">Network</span></div>
    <div class="controls">
      <select id="domain-filter" class="clean-select">
        <option value="all">Tous les projets</option>
      </select>
      <button id="add-node-btn" class="clean-button">Ajouter ma pierre</button>
    </div>
  </header>

  <div id="focus-card" class="focus-card glass hidden">
    <div class="card-header">
      <div class="card-domain" id="detail-domain">Domaine</div>
      <button id="close-details" class="close-icon">&times;</button>
    </div>
    <h3 id="detail-name">Nom du Nœud</h3>
    <p id="detail-desc" class="desc">Description du projet...</p>
    <div class="divider"></div>
    <p class="subtitle">Contributeurs</p>
    <div class="contributors-list" id="detail-contributors">
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
